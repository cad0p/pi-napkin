name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the contributor-machine version so a bun-internal
          # release regression (test runner, fs API, bun:test semantics)
          # can't break CI without an explicit bump in this repo
          # (CI-A-3 — never-deferrable per the methodology guide's
          # third-party dep version pin rule). Bump deliberately when
          # a new bun release ships something useful.
          bun-version: 1.3.13
      # macOS doesn't ship GNU coreutils. The distill wrapper depends on
      # timeout(1) (or gtimeout) for the agent task's hard wall-clock
      # budget; without coreutils the wrapper fails fast on macOS at
      # startup. Install coreutils so the macOS matrix slot exercises
      # the same wrapper path Linux does, and the CI-A-1 detection
      # logic gets covered on the platform it was added for.
      - name: Install coreutils on macOS
        if: runner.os == 'macOS'
        run: brew install coreutils
      # Defensive: set git identity at the workflow level so any test
      # that calls `git commit` without setting GIT_AUTHOR_*/GIT_COMMITTER_*
      # in its spawned env still has an identity to fall back on. Mirrors
      # PR #11's CI-fix recipe (`features/pi-napkin-distill/pr-11/deferred.md`,
      # "Discovered on pi-napkin PR #11 (2026-05-12): 16 tests failed in
      # CI due to missing git identity"). The new wrapper-validation /
      # wrapper-salvage tests already set identity inside their stubs
      # AND in spawnSync env, but this catches any future test that
      # forgets one of the layers (CI-A-4 — never-deferrable per the
      # methodology guide's stale-references / known-blind-spot rule).
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@pi-napkin.test"
          git config --global user.name "pi-napkin CI"
          git config --global init.defaultBranch main
      - run: bun install
      - name: Lint
        run: bunx biome check extensions/
      - name: Type check
        run: bunx tsc --noEmit
      - name: Run tests
        run: bun test
